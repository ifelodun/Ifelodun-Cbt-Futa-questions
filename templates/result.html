<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#89f7fe,#66a6ff);
        }
        .card{
            background:white;
            border-radius:20px;
            padding:35px;
            width:90%;
            max-width:520px;
            text-align:center;
            box-shadow:0 10px 24px rgba(0,0,0,0.15);
        }
        .score{
            font-size:46px;
            font-weight:bold;
            color:#16a34a;
            margin:20px 0;
        }
        .grade{
            font-size:28px;
            font-weight:bold;
            color:#1d4ed8;
        }
        .btn{
            display:inline-block;
            margin-top:16px;
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:12px 22px;
            border-radius:24px;
            font-weight:bold;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>{{ subject_name }} Result</h2>
    <p>Student: {{ student_name }}</p>
    <div class="score">{{ score }}/{{ total }}</div>
    <p>Percentage: {{ percentage }}%</p>
    <div class="grade">Grade: {{ grade }}</div>
    <a href="/home" class="btn">Back Home</a>
</div>
</body>
</html>
