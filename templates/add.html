<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#84fab0,#8fd3f4);
        }
        .container{
            width:90%;
            max-width:700px;
            margin:40px auto;
        }
        .card{
            background:white;
            border-radius:18px;
            box-shadow:0 8px 20px rgba(0,0,0,0.12);
            padding:25px;
        }
        input, select{
            width:100%;
            box-sizing:border-box;
            padding:12px;
            margin-bottom:14px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
        }
        .btn{
            text-decoration:none;
            border:none;
            padding:12px 20px;
            border-radius:24px;
            color:white;
            font-weight:bold;
            cursor:pointer;
            display:inline-block;
        }
        .btn-back{ background:#6b7280; }
        .btn-save{ background:#16a34a; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Add New Question</h2>

        <form method="POST">
            <select name="subject" required>
                <option value="">Select Subject</option>
                {% for s in subjects %}
                <option value="{{ s.name }}">{{ s.name }}</option>
                {% endfor %}
            </select>

            <input name="question" placeholder="Enter question" required>
            <input name="opt1" placeholder="Option 1" required>
            <input name="opt2" placeholder="Option 2" required>
            <input name="opt3" placeholder="Option 3" required>
            <input name="opt4" placeholder="Option 4" required>
            <input name="answer" placeholder="Correct answer" required>

            <a href="/admin" class="btn btn-back">Back</a>
            <button type="submit" class="btn btn-save">Save Question</button>
        </form>
    </div>
</div>
</body>
</html>
